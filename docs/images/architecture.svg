<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="'DejaVu Sans', 'Helvetica', sans-serif">
  <style>
    .title  { font-size: 20px; font-weight: 700; fill: #202124; }
    .h      { font-size: 15px; font-weight: 700; fill: #202124; }
    .lbl    { font-size: 12.5px; fill: #3c4043; }
    .mono   { font-family: 'DejaVu Sans Mono', monospace; font-size: 12px; fill: #3c4043; }
    .port   { font-family: 'DejaVu Sans Mono', monospace; font-size: 12px; font-weight: 700; fill: #1a73e8; }
    .edge   { stroke: #5f6368; stroke-width: 2; fill: none; }
    .edgelb { font-size: 11px; fill: #5f6368; font-family: 'DejaVu Sans Mono', monospace; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>

  <text x="24" y="34" class="title">android-wifi-mcp — one phone, driven locally or from another machine</text>

  <!-- ===== MCP clients ===== -->
  <rect x="24" y="70" width="226" height="330" rx="10" fill="#f8f9fa" stroke="#dadce0"/>
  <text x="40" y="96" class="h">MCP clients</text>

  <rect x="40" y="120" width="194" height="78" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="52" y="143" class="lbl">local (on the host)</text>
  <text x="52" y="164" class="mono">stdio shim</text>
  <text x="52" y="182" class="mono" fill="#5f6368">android-wifi-shim.mjs</text>

  <rect x="40" y="216" width="194" height="78" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="52" y="239" class="lbl">remote (another machine)</text>
  <text x="52" y="260" class="mono">mcp-remote → HTTP</text>
  <text x="52" y="278" class="mono" fill="#5f6368">--allow-http</text>

  <!-- ===== USB host ===== -->
  <rect x="360" y="70" width="396" height="360" rx="10" fill="#f1f3f4" stroke="#5f6368"/>
  <text x="378" y="96" class="h">USB host</text>

  <!-- android-wifi -->
  <rect x="378" y="116" width="360" height="120" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="392" y="139" class="h">android-wifi</text>
  <text x="640" y="139" class="port">:3000</text>
  <text x="392" y="159" class="lbl">Streamable HTTP · 32 tools · adb (execFile)</text>
  <rect x="392" y="172" width="332" height="50" rx="6" fill="#ceead6" stroke="#34a853" stroke-dasharray="4 3"/>
  <text x="404" y="192" class="lbl">mobile-next — stdio upstream (#102)</text>
  <text x="404" y="210" class="mono" fill="#5f6368">mobile_* UI tools, proxied in</text>

  <!-- android-playwright -->
  <rect x="378" y="252" width="360" height="58" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="392" y="276" class="h">android-playwright</text>
  <text x="640" y="276" class="port">:8931</text>
  <text x="392" y="296" class="lbl">device-browser tools · via CDP</text>

  <!-- postgres -->
  <rect x="378" y="326" width="360" height="50" rx="8" fill="#f8f9fa" stroke="#dadce0"/>
  <text x="392" y="349" class="lbl" font-weight="700">Postgres (optional)</text>
  <text x="392" y="367" class="mono" fill="#5f6368">structured logs ← DATABASE_URL</text>

  <!-- ===== phone ===== -->
  <rect x="856" y="150" width="120" height="200" rx="14" fill="#f3e8fd" stroke="#a142f4"/>
  <rect x="872" y="178" width="88" height="128" rx="4" fill="#fff" stroke="#a142f4"/>
  <text x="916" y="172" class="h" text-anchor="middle">Android</text>
  <text x="916" y="332" class="lbl" text-anchor="middle">phone</text>
  <circle cx="916" cy="322" r="5" fill="none" stroke="#a142f4"/>

  <!-- ===== edges ===== -->
  <!-- local client -> android-wifi -->
  <path class="edge" d="M234,159 H300 V176 H372" marker-end="url(#arrow)"/>
  <!-- remote client -> android-wifi -->
  <path class="edge" d="M234,255 H320 V176 H372" marker-end="url(#arrow)"/>
  <!-- remote client -> playwright -->
  <path class="edge" d="M234,272 H300 V281 H372" marker-end="url(#arrow)"/>

  <!-- android-wifi -> phone (adb) -->
  <path class="edge" d="M738,176 H800 V210 H850" marker-end="url(#arrow)"/>
  <text x="752" y="170" class="edgelb">adb</text>
  <!-- playwright -> phone (CDP) -->
  <path class="edge" d="M738,281 H812 V250 H850" marker-end="url(#arrow)"/>
  <text x="744" y="300" class="edgelb">CDP :9222</text>

  <text x="24" y="448" class="lbl" fill="#5f6368">Both HTTP endpoints bind 0.0.0.0 with no auth — the control is the network boundary (trusted LAN / VPN / firewall).</text>
</svg>
