id: TC-WIFI-001
name: wifi_enable / wifi_disable toggle the radio, confirmed by the tool
suite: wifi
tags: [wifi, radio]
priority: 1
timeout: 60000
dependencies: []

steps:
  - name: Enable WiFi
    command: npx tsx cicd/tests/src/mcp-client.ts wifi_enable '{}'
    expectPatterns:
      - "enabled successfully"
    rejectPatterns:
      - "isError"
      - "command sent"
  - name: Disable WiFi
    command: npx tsx cicd/tests/src/mcp-client.ts wifi_disable '{}'
    expectPatterns:
      - "disabled successfully"
    rejectPatterns:
      - "isError"
      - "command sent"
  - name: Re-enable WiFi (leave the device as found)
    command: npx tsx cicd/tests/src/mcp-client.ts wifi_enable '{}'
    expectPatterns:
      - "enabled successfully"
    rejectPatterns:
      - "isError"
      - "command sent"

criteria: |
  wifi_enable and wifi_disable change the radio state. The server returns
  "WiFi enabled/disabled successfully" only after re-reading isEnabled() and confirming
  the new state (otherwise "... command sent", which we reject) — so the confirmed
  message is the verification, avoiding brittle status-string parsing over the
  double-encoded payload. Needs a device; no access point required.
