id: TC-SMK-011
name: device_screenshot saves a PNG to a host path
suite: smoke
tags: [smoke, screenshot]
priority: 11
timeout: 60000
dependencies: []

steps:
  - name: Capture a screenshot to /tmp/tc-smk-011.png
    command: npx tsx cicd/tests/src/mcp-client.ts device_screenshot '{"outputPath":"/tmp/tc-smk-011.png"}'
    expectPatterns:
      - "success.*true"
      - "outputPath.*tc-smk-011"
      - "bytes"
    rejectPatterns:
      - "isError"

  - name: Verify the file is a non-trivial PNG
    command: test -s /tmp/tc-smk-011.png && file /tmp/tc-smk-011.png && rm -f /tmp/tc-smk-011.png
    expectPatterns:
      - "PNG image"
    rejectPatterns:
      - "empty"

criteria: |
  Verify device_screenshot writes a PNG file to the host.
  - Tool returns success: true with the requested outputPath
  - The file exists, is non-empty, and `file(1)` recognizes it as a PNG
  - Cleans up the host file in the verification step
  - Tests file-output path; base64 path is exercised by ad-hoc smoke
